<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ระบบจองห้องสมุด - ตารางการจอง</title>
    <link rel="stylesheet" href="../css/Project.css">
    <style>
        .queue-container {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        
        .queue-container h2 {
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .queue-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow: hidden;
            border-radius: 8px;
        }
        
        .queue-table th, .queue-table td {
            padding: 14px 12px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .queue-table th {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: white;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.5px;
        }
        
        .queue-table tbody tr {
            transition: background-color 0.3s ease;
        }
        
        .queue-table tbody tr:hover {
            background-color: #f8f9ff;
        }
        
        .queue-table tbody tr:last-child td {
            border-bottom: none;
        }
        
        /* Status Styles */
        .status-approved {
            display: inline-block;
            color: #065f46;
            background: #d1fae5;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid #a7f3d0;
            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.1);
        }
        
        .status-pending {
            display: inline-block;
            color: #92400e;
            background: #fef3c7;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid #fde68a;
            box-shadow: 0 2px 4px rgba(245, 158, 11, 0.1);
        }
        
        .status-rejected {
            display: inline-block;
            color: #7f1d1d;
            background: #fee2e2;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid #fecaca;
            box-shadow: 0 2px 4px rgba(239, 68, 68, 0.1);
        }
        
        .status-expired {
            display: inline-block;
            color: #374151;
            background: #e5e7eb;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid #d1d5db;
            box-shadow: 0 2px 4px rgba(107, 114, 128, 0.1);
        }
        
        .btn-cancel {
            background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 6px rgba(239, 68, 68, 0.2);
        }
        
        .btn-cancel:hover {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }
        
        .btn-cancel:active {
            transform: translateY(0);
        }
    </style>
</head>
<body style="background: #f4f6f9; display: block;">

    <nav class="navbar">
        <div class="logo">LibraryBooking</div>
        <a href="\frontend\index.html" class="btn-nav" style="background: #6c757d;">กลับหน้าหลัก</a>
    </nav>

    <div class="queue-container">
        <h2 style="color: #4f46e5; text-align: center;">ตารางการจองห้องสมุดปัจจุบัน</h2>
        
        <table class="queue-table">
            <thead>
                <tr>
                    <th>วันที่</th>
                    <th>ห้อง</th>
                    <th>ช่วงเวลา</th>
                    <th>ผู้จอง (รหัส/เบอร์)</th>
                    <th>สถานะ</th>
                    <th>จัดการ</th> </tr>
            </thead>
            <tbody id="scheduleBody">
                </tbody>
        </table>
    </div>

    <script src="../js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // ดึงข้อมูลผู้ใช้ที่ล็อกอินอยู่
        const currentUserStr = localStorage.getItem('currentUser');
        const currentUser = currentUserStr ? JSON.parse(currentUserStr) : null;

        async function fetchSchedule() {
            try {
                const res = await fetch(window.apiUrl('/api/getBookings'));
                const data = await res.json();

                const tbody = document.getElementById('scheduleBody');
                tbody.innerHTML = ''; 

                if(data.bookings.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="padding: 20px; color: #666;">ยังไม่มีคิวการจองในระบบ สามารถเข้าจองได้เลยครับ</td></tr>';
                    return;
                }

                data.bookings.forEach(b => {
                    const tr = document.createElement('tr');
                    
                    const dateObj = new Date(b.date);
                    const formattedDate = dateObj.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });

                    // เช็คสิทธิ์: ถ้าคนที่ล็อกอินอยู่ คือเจ้าของคิว ให้โชว์ปุ่ม "ยกเลิก"
                    let actionHtml = '-';
                    if (currentUser && currentUser.student_id == b.email) {
                        actionHtml = `<button class="btn-cancel" onclick="cancelBooking(${b.id})">ยกเลิก</button>`;
                    }
                    let statusHtml="";
                    if(b.status==="Approved"){
                        statusHtml=`<span class="status-approved">✓ อนุมัติการจอง</span>`;
                    }
                    else if(b.status==="Pending"){
                        statusHtml=`<span class="status-pending">⏱ รออนุมัติ</span>`;
                    }
                    else if(b.status==="Rejected"){
                        statusHtml=`<span class="status-rejected">✕ ไม่อนุมัติ</span>`;
                    }
                    else if(b.status==="ยกเลิกโดยระบบ"){
                        statusHtml=`<span class="status-expired">⌛ หมดเวลา</span>`;
                    }
                    else{
                        statusHtml=`<span style="color: #6b7280;">${b.status}</span>`;
                    }

                    tr.innerHTML = `
                        <td style="font-weight: bold;">${formattedDate}</td>
                        <td style="color: #4f46e5; font-weight: bold;">${b.subject}</td>
                        <td>${b.message}</td>
                        <td>${b.username} <br><span style="font-size: 12px; color: #666;">(${b.email})</span></td>
                        <td>${statusHtml}</td>
                        <td>${actionHtml}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch(err) {
                console.error("Error fetching schedule:", err);
            }
        }

        // ฟังก์ชันสำหรับกดยกเลิก
        async function cancelBooking(bookingId) {
            Swal.fire({
                title: 'ต้องการยกเลิกการจอง?',
                text: "หากยกเลิกแล้ว จะไม่สามารถกู้คืนได้",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'ใช่, ยกเลิกเลย!',
                cancelButtonText: 'ปิด'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const res = await fetch(window.apiUrl('/api/cancel-booking'), {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                bookingId: bookingId, 
                                student_id: currentUser.student_id // ส่งรหัสนศ. ไปยืนยันด้วย
                            })
                        });
                        const data = await res.json();

                        if(data.success) {
                            Swal.fire('ยกเลิกสำเร็จ!', 'คิวของคุณถูกลบออกจากระบบแล้ว', 'success');
                            fetchSchedule(); // รีเฟรชตารางใหม่ทันที
                        } else {
                            Swal.fire('ผิดพลาด', data.message, 'error');
                        }
                    } catch(err) {
                        Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
                    }
                }
            });
        }

        fetchSchedule();
        setInterval(fetchSchedule, 5000); // รีเฟรชข้อมูลทุก 5 วินาที
    </script>
</body>
</html>
